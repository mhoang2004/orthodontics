name: tooth-env
channels:
  - pytorch
  - nvidia          # Thêm channel này để lấy cudatoolkit chuẩn
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pytorch=1.10.0
  - torchvision=0.11.1
  - cudatoolkit=11.3
  - numpy=1.21.6
  - matplotlib=3.5.2
  - pillow=9.1.1
  - pyyaml=6.0
  - scikit-image=0.19.3
  - tqdm=4.64.0
  - dlib=19.17.0
  - pip
  - pip:
      - opencv-python==4.6.0.66
      - natsort==8.1.0
      - fastapi==0.95.2
      - uvicorn==0.22.0
      - aiofiles
      - python-multipart
      - Flask
