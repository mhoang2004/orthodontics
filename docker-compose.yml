services:
  dental_triton:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dental_triton
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DENTAL_CONFIG_PATH=/app/src/Config.yaml
      - DENTAL_WEIGHTS_DIR=/app/weights
      - TRITON_TMP_DIR=/tmp/triton_io
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    ports:
      - "8000:8000"
    volumes:
      - ./triton_model_repository:/models:ro
      - ./Code:/app/src:ro
      - type: tmpfs
        target: /tmp/triton_io
        tmpfs:
          size: 500m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v2/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: no
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orthodontics_backend
    environment:
      - TRITON_URL=dental_triton:8000
    ports:
      - "8001:8001"
    depends_on:
      dental_triton:
        condition: service_healthy
    restart: no

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orthodontics_frontend
    ports:
      - "5000:5000"
    depends_on:
      - backend
    restart: no
